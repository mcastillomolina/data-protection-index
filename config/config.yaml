# Main configuration file for Data Protection Index

project:
  name: "Data Protection Index"
  version: "0.2.0"
  phase: 2

llm:
  provider: "groq"  # Options: "openai", "anthropic", "groq"
  # groq models (free tier): llama-3.3-70b-versatile, llama-3.1-8b-instant, mixtral-8x7b-32768, gemma2-9b-it
  # openai models: gpt-4o, gpt-4o-mini, gpt-4-turbo
  # anthropic models: claude-3-5-sonnet-20241022, claude-3-haiku-20240307
  model: "llama-3.3-70b-versatile"
  # model: "llama-3.1-8b-instant"
  temperature: 0.3  # Lower for more consistent outputs
  max_tokens: 2000
  timeout: 30
  max_retries: 3

search:
  provider: "serpapi"
  max_results_per_query: 10
  timeout: 15
  rate_limit_delay: 1.0  # seconds between requests

pipeline:
  max_documents_per_country: 20
  top_urls_per_document: 5
  min_relevance_score: 6.0
  enable_deduplication: true
  enable_caching: true
  cache_dir: "data/cache"

output:
  directory: "data/outputs"
  save_intermediate: true
  intermediate_dir: "intermediate"
  format: "json"
  pretty_print: true
  include_metadata: true

retrieval:
  timeout: 30
  max_retries: 3
  retry_delay: 2.0  # seconds between retry attempts
  min_text_length: 200  # minimum chars to consider extraction successful
  user_agent: "DataProtectionIndex/1.0"

logging:
  level: "INFO"  # DEBUG, INFO, WARNING, ERROR
  format: "{time:YYYY-MM-DD HH:mm:ss} | {level: <8} | {name}:{function}:{line} - {message}"
  file: "logs/discovery.log"
  rotation: "10 MB"
  retention: "1 week"
