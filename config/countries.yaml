# Country-specific metadata for document discovery

countries:
  - name: "Chile"
    iso_code: "CL"
    official_languages: ["es"]
    government_domains: [".gob.cl", ".cl"]
    region: "Latin America"
    known_documents:
      constitution: "Constitución Política de la República de Chile"
      data_protection_law: "Ley 19.628 sobre Protección de la Vida Privada"
      dpa: "Consejo para la Transparencia"
    search_hints:
      - "bcn.cl"  # Biblioteca del Congreso Nacional
      - "consejotransparencia.cl"
      - "leychile.cl"

  - name: "Germany"
    iso_code: "DE"
    official_languages: ["de"]
    government_domains: [".bund.de", ".de"]
    region: "Europe"
    known_documents:
      constitution: "Grundgesetz für die Bundesrepublik Deutschland"
      data_protection_law: "Bundesdatenschutzgesetz (BDSG)"
      dpa: "Bundesbeauftragter für den Datenschutz (BfDI)"
    search_hints:
      - "gesetze-im-internet.de"
      - "bfdi.bund.de"
      - "bundestag.de"

  - name: "United Kingdom"
    iso_code: "GB"
    official_languages: ["en"]
    government_domains: [".gov.uk", ".uk"]
    region: "Europe"
    known_documents:
      constitution: "Constitutional Acts and Human Rights Act 1998"
      data_protection_law: "Data Protection Act 2018 and UK GDPR"
      dpa: "Information Commissioner's Office (ICO)"
    search_hints:
      - "legislation.gov.uk"
      - "ico.org.uk"
      - "parliament.uk"
